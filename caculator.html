<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aysha's Calculator 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Pretty Pink Calculator — Styles
   Palette: Light Pink #FFD6E8 · Baby Pink #FFC2D6 · Hot Pink #FF69B4 · White
   ============================================================ */

:root {
  --light-pink: #FFD6E8;
  --baby-pink: #FFC2D6;
  --hot-pink: #FF69B4;
  --hot-pink-deep: #E0559E;
  --white: #FFFFFF;
  --lavender: #E9D6FF;
  --lavender-deep: #D9BEFA;
  --red-soft: #FF8FA3;
  --red-soft-deep: #FF6B85;
  --ink: #6B3A57;
  --ink-soft: #9A6B87;

  --radius-lg: 30px;
  --radius-md: 22px;
  --radius-sm: 18px;

  --shadow-soft: 0 20px 45px rgba(255, 105, 180, 0.25), 0 6px 16px rgba(255, 105, 180, 0.12);
  --shadow-btn: 0 4px 10px rgba(255, 105, 180, 0.18);

  --font-display: 'Quicksand', sans-serif;
  --font-body: 'Nunito', sans-serif;
}

* {
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  margin: 0;
  height: 100vh;
  height: 100dvh;
  font-family: var(--font-body);
  background: linear-gradient(135deg, #FFE3F0 0%, #FFD6E8 35%, #FFC2D6 70%, #FFB3D1 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(10px, 3vh, 24px);
  position: relative;
  overflow: hidden;
}

/* ---------- Ambient floating blobs ---------- */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.45;
  z-index: 0;
  pointer-events: none;
  animation: float 14s ease-in-out infinite;
}
.blob-1 {
  width: 320px;
  height: 320px;
  background: var(--hot-pink);
  top: -80px;
  left: -80px;
  animation-delay: 0s;
}
.blob-2 {
  width: 260px;
  height: 260px;
  background: var(--lavender-deep);
  bottom: -60px;
  right: -60px;
  animation-delay: -5s;
}
.blob-3 {
  width: 200px;
  height: 200px;
  background: var(--baby-pink);
  top: 40%;
  right: 10%;
  animation-delay: -9s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(20px, -30px) scale(1.08); }
  66% { transform: translate(-15px, 20px) scale(0.95); }
}

@media (prefers-reduced-motion: reduce) {
  .blob { animation: none; }
}

/* ---------- Splash / intro screen ---------- */
.splash {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #FFE3F0 0%, #FFD6E8 35%, #FFC2D6 70%, #FFB3D1 100%);
  animation: splashOut 0.6s ease forwards;
  animation-delay: 1.4s;
}

.splash-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(1.6rem, 6vw, 2.4rem);
  color: var(--hot-pink-deep);
  text-shadow: 0 4px 14px rgba(255, 105, 180, 0.35);
  margin: 0;
  padding: 0 24px;
  text-align: center;
  animation: splashText 1.4s ease forwards;
}

@keyframes splashText {
  0%   { opacity: 0; transform: translateY(10px) scale(0.96); }
  20%  { opacity: 1; transform: translateY(0) scale(1); }
  80%  { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-6px) scale(1.02); }
}

@keyframes splashOut {
  from { opacity: 1; visibility: visible; }
  to   { opacity: 0; visibility: hidden; pointer-events: none; }
}

@media (prefers-reduced-motion: reduce) {
  .splash { animation-duration: 0.4s; animation-delay: 0.6s; }
  .splash-title { animation: none; opacity: 1; }
}

/* Calculator starts hidden, then plays its own "rise" entrance once the splash clears */
.calculator.is-hidden {
  opacity: 0;
}
.calculator.is-revealed {
  animation: rise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* ---------- Calculator shell ---------- */
.calculator {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  max-height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-lg);
  padding: clamp(14px, 3vh, 22px) clamp(14px, 4vw, 20px) clamp(10px, 2.5vh, 18px);
  box-shadow: var(--shadow-soft);
  transition: opacity 0.4s ease;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(18px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ---------- Header ---------- */
.calc-header {
  position: relative;
  text-align: center;
  margin-bottom: clamp(6px, 1.5vh, 14px);
  flex-shrink: 0;
}

.clock {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--ink);
  margin: 0 0 4px;
  opacity: 0.85;
}

.calc-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--hot-pink-deep);
  margin: 0;
  padding: 0 36px;
  letter-spacing: 0.01em;
  text-shadow: 0 2px 8px rgba(255, 105, 180, 0.25);
}

/* ---------- Display ---------- */
.display-wrap {
  position: relative;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: var(--radius-md);
  padding: clamp(10px, 2vh, 18px) 18px clamp(8px, 1.5vh, 14px);
  margin-bottom: clamp(8px, 2vh, 18px);
  box-shadow: inset 0 2px 8px rgba(255, 105, 180, 0.08), 0 2px 6px rgba(255,255,255,0.4);
  min-height: clamp(64px, 12vh, 92px);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}

.memory-indicator {
  position: absolute;
  top: 10px;
  left: 16px;
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--white);
  background: var(--lavender-deep);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.memory-indicator.active {
  opacity: 1;
  transform: scale(1);
}

/* ---------- History toggle button ---------- */
.history-toggle {
  position: absolute;
  top: 0;
  right: 0;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  color: var(--hot-pink-deep);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(255, 105, 180, 0.2);
  transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
}
.history-toggle:hover {
  transform: translateY(-1px) scale(1.05);
  box-shadow: 0 6px 14px rgba(255, 105, 180, 0.3);
}
.history-toggle:active {
  transform: scale(0.92);
}
.history-toggle:focus-visible {
  outline: 3px solid var(--hot-pink-deep);
  outline-offset: 2px;
}

/* ---------- History panel (slides in from the right, covers the calculator) ---------- */
.history-panel {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  background: rgba(255, 246, 250, 0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: var(--radius-lg);
  padding: clamp(14px, 3vh, 22px) clamp(14px, 4vw, 20px);
  transform: translateX(105%);
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: -8px 0 30px rgba(255, 105, 180, 0.18);
}
.history-panel.open {
  transform: translateX(0);
}

.history-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  margin-bottom: 10px;
}
.history-panel-header h2 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--hot-pink-deep);
  margin: 0;
}
.history-close {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 50%;
  background: var(--baby-pink);
  color: var(--ink);
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, filter 0.2s ease;
}
.history-close:hover {
  filter: brightness(1.05);
  transform: scale(1.05);
}
.history-close:active {
  transform: scale(0.9);
}

.history-list {
  list-style: none;
  margin: 0;
  padding: 0;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.history-list::-webkit-scrollbar {
  width: 6px;
}
.history-list::-webkit-scrollbar-thumb {
  background: var(--baby-pink);
  border-radius: 10px;
}

.history-empty {
  text-align: center;
  color: var(--ink-soft);
  font-weight: 600;
  font-size: 0.9rem;
  margin-top: 20px;
}

.history-item {
  width: 100%;
  text-align: right;
  background: rgba(255, 255, 255, 0.65);
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
  flex-shrink: 0;
}
.history-item:hover {
  background: rgba(255, 255, 255, 0.9);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(255, 105, 180, 0.2);
}
.history-item:active {
  transform: scale(0.98);
}
.history-item-expr {
  display: block;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--ink-soft);
  font-weight: 600;
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.history-item-expr::-webkit-scrollbar { display: none; }
.history-item-result {
  display: block;
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.history-item-result::-webkit-scrollbar { display: none; }

.history-clear {
  flex-shrink: 0;
  margin-top: 10px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--red-soft);
  color: var(--white);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.9rem;
  padding: 10px 0;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
}
.history-clear:hover {
  filter: brightness(1.05);
  box-shadow: 0 6px 16px rgba(255, 107, 133, 0.35);
}
.history-clear:active {
  transform: scale(0.97);
}

.expression {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink-soft);
  text-align: right;
  min-height: 22px;
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  transition: opacity 0.2s ease;
}
.expression::-webkit-scrollbar { display: none; }

.result {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--ink);
  text-align: right;
  font-size: 2.4rem;
  line-height: 1.2;
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  transition: opacity 0.15s ease;
}
.result::-webkit-scrollbar { display: none; }

.result.fade {
  animation: fadeSwap 0.25s ease;
}
@keyframes fadeSwap {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result.error {
  color: var(--red-soft-deep);
  font-size: 1.6rem;
}

/* Auto-shrink helper classes applied via JS based on length */
.result.size-lg { font-size: 2.4rem; }
.result.size-md { font-size: 1.9rem; }
.result.size-sm { font-size: 1.5rem; }
.result.size-xs { font-size: 1.2rem; }

/* ---------- Buttons grid ---------- */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(8px, 1.8vh, 16px);
  flex-shrink: 1;
  min-height: 0;
}

.btn {
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(0.9rem, 2.1vh, 1.05rem);
  padding: clamp(10px, 1.9vh, 16px) 0;
  cursor: pointer;
  color: var(--ink);
  box-shadow: var(--shadow-btn);
  transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease, background 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: translateY(-2px);
  filter: brightness(1.04);
  box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
}

.btn:active,
.btn.pressed {
  transform: translateY(0) scale(0.94);
  box-shadow: 0 2px 6px rgba(255, 105, 180, 0.2);
}

.btn:focus-visible {
  outline: 3px solid var(--hot-pink-deep);
  outline-offset: 2px;
}

/* Ripple glow on click */
.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, transparent 60%);
  opacity: 0;
  transform: scale(0.4);
  transition: opacity 0.4s ease, transform 0.4s ease;
  pointer-events: none;
}
.btn.pressed::after {
  opacity: 1;
  transform: scale(1.4);
  transition: opacity 0s, transform 0s;
}

/* Number buttons: white */
.btn-number {
  background: var(--white);
  color: var(--ink);
}

/* Operator buttons: pink */
.btn-operator {
  background: var(--baby-pink);
  color: var(--ink);
}

/* Equal button: dark/hot pink, full width, spans grid */
.btn-equal {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, var(--hot-pink), var(--hot-pink-deep));
  color: var(--white);
  font-size: clamp(1.05rem, 2.4vh, 1.3rem);
  padding: clamp(12px, 2.1vh, 16px) 0;
  box-shadow: 0 10px 24px rgba(224, 85, 158, 0.45);
}
.btn-equal:hover {
  box-shadow: 0 14px 30px rgba(224, 85, 158, 0.55);
}

/* Clear buttons: red/pink */
.btn-clear {
  background: var(--red-soft);
  color: var(--white);
}
.btn-clear:hover {
  box-shadow: 0 8px 20px rgba(255, 107, 133, 0.4);
}

/* Memory buttons: lavender/pink */
.btn-memory {
  background: var(--lavender);
  color: var(--ink);
  font-size: 0.95rem;
}
.btn-memory:hover {
  box-shadow: 0 8px 20px rgba(217, 190, 250, 0.5);
}

/* ---------- Footer ---------- */
.calc-footer {
  text-align: center;
  margin-top: clamp(6px, 1.5vh, 16px);
  font-size: 0.8rem;
  color: var(--ink-soft);
  font-weight: 600;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

/* ============================================================
   Responsive breakpoints
   ============================================================ */

/* Tablet */
@media (max-width: 600px) {
  .calculator {
    max-width: 100%;
    padding: 18px 14px 14px;
    border-radius: var(--radius-md);
  }
  .result { font-size: 2.1rem; }
  .calc-title { font-size: 1.15rem; }
}

/* Small mobile */
@media (max-width: 360px) {
  .btn {
    font-size: 0.95rem;
    padding: 13px 0;
    border-radius: 16px;
  }
  .result { font-size: 1.8rem; }
  .buttons { gap: 12px; }
}

/* Larger screens: a touch more breathing room */
@media (min-width: 900px) {
  .calculator {
    max-width: 400px;
    padding: 26px 24px 20px;
  }
}

  </style>
</head>
<body>

  <!-- Splash / intro screen -->
  <div class="splash" id="splash" role="status" aria-label="Loading Aysha's Calculator">
    <p class="splash-title">Aysha's Calculator <span aria-hidden="true">🌸</span></p>
  </div>

  <!-- Decorative floating blobs for ambient background -->
  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>
  <div class="blob blob-3" aria-hidden="true"></div>

  <main class="calculator is-hidden" id="calculatorApp" role="application" aria-label="Aysha's Calculator">

    <!-- Header: clock + title -->
    <header class="calc-header">
      <p class="clock" id="clock" aria-live="off">--:--:-- --</p>
      <h1 class="calc-title">Aysha's Calculator <span aria-hidden="true">🌸</span></h1>
      <button type="button" class="history-toggle" id="historyToggle" aria-label="View calculation history" aria-expanded="false">🕘</button>
    </header>

    <!-- Display -->
    <section class="display-wrap" aria-label="Calculator display">
      <div class="memory-indicator" id="memoryIndicator" aria-hidden="true">M</div>
      <div class="expression" id="expression" aria-live="polite">&nbsp;</div>
      <div class="result" id="result" aria-live="polite">0</div>
    </section>

    <!-- History panel (slides over the calculator) -->
    <div class="history-panel" id="historyPanel" aria-hidden="true">
      <div class="history-panel-header">
        <h2>History</h2>
        <button type="button" class="history-close" id="historyClose" aria-label="Close history">✕</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">No calculations yet 🌸</li>
      </ul>
      <button type="button" class="history-clear" id="historyClear">Clear History</button>
    </div>

    <!-- Buttons -->
    <section class="buttons" aria-label="Calculator buttons">

      <!-- Row 1: Memory -->
      <button type="button" class="btn btn-memory" data-action="mc" aria-label="Memory Clear">MC</button>
      <button type="button" class="btn btn-memory" data-action="mr" aria-label="Memory Recall">MR</button>
      <button type="button" class="btn btn-memory" data-action="m-plus" aria-label="Memory Add">M+</button>
      <button type="button" class="btn btn-memory" data-action="m-minus" aria-label="Memory Subtract">M-</button>

      <!-- Row 2: Clear / backspace / percent -->
      <button type="button" class="btn btn-clear" data-action="ce" aria-label="Clear Entry">CE</button>
      <button type="button" class="btn btn-clear" data-action="c" aria-label="Clear All">C</button>
      <button type="button" class="btn btn-clear" data-action="backspace" aria-label="Backspace">⌫</button>
      <button type="button" class="btn btn-operator" data-action="percent" aria-label="Percent">%</button>

      <!-- Row 3: scientific -->
      <button type="button" class="btn btn-operator" data-action="sqrt" aria-label="Square root">√</button>
      <button type="button" class="btn btn-operator" data-action="square" aria-label="Square">x²</button>
      <button type="button" class="btn btn-operator" data-action="reciprocal" aria-label="Reciprocal">1/x</button>
      <button type="button" class="btn btn-operator" data-value="/" data-action="operator" aria-label="Divide">÷</button>

      <!-- Row 4 -->
      <button type="button" class="btn btn-number" data-value="7" data-action="number">7</button>
      <button type="button" class="btn btn-number" data-value="8" data-action="number">8</button>
      <button type="button" class="btn btn-number" data-value="9" data-action="number">9</button>
      <button type="button" class="btn btn-operator" data-value="*" data-action="operator" aria-label="Multiply">×</button>

      <!-- Row 5 -->
      <button type="button" class="btn btn-number" data-value="4" data-action="number">4</button>
      <button type="button" class="btn btn-number" data-value="5" data-action="number">5</button>
      <button type="button" class="btn btn-number" data-value="6" data-action="number">6</button>
      <button type="button" class="btn btn-operator" data-value="-" data-action="operator" aria-label="Subtract">-</button>

      <!-- Row 6 -->
      <button type="button" class="btn btn-number" data-value="1" data-action="number">1</button>
      <button type="button" class="btn btn-number" data-value="2" data-action="number">2</button>
      <button type="button" class="btn btn-number" data-value="3" data-action="number">3</button>
      <button type="button" class="btn btn-operator" data-value="+" data-action="operator" aria-label="Add">+</button>

      <!-- Row 7 -->
      <button type="button" class="btn btn-number" data-value="(" data-action="paren" aria-label="Open parenthesis">(</button>
      <button type="button" class="btn btn-number" data-value="0" data-action="number">0</button>
      <button type="button" class="btn btn-number" data-value=")" data-action="paren" aria-label="Close parenthesis">)</button>
      <button type="button" class="btn btn-number" data-value="." data-action="decimal" aria-label="Decimal point">.</button>

      <!-- Row 8: equals spans full width -->
      <button type="button" class="btn btn-equal" data-action="equals" aria-label="Calculate result">=</button>

    </section>

    <footer class="calc-footer">Made with ❤️</footer>

  </main>

<script>
/* ============================================================
   Pretty Pink Calculator — Logic
   Vanilla JS. No eval() — expressions are parsed and evaluated
   by a small hand-written recursive-descent parser for safety.
   ============================================================ */

(() => {
  'use strict';

  /* ---------------- DOM references ---------------- */
  const expressionEl = document.getElementById('expression');
  const resultEl = document.getElementById('result');
  const memoryIndicatorEl = document.getElementById('memoryIndicator');
  const clockEl = document.getElementById('clock');
  const historyToggleEl = document.getElementById('historyToggle');
  const historyPanelEl = document.getElementById('historyPanel');
  const historyCloseEl = document.getElementById('historyClose');
  const historyListEl = document.getElementById('historyList');
  const historyClearEl = document.getElementById('historyClear');
  const buttons = document.querySelectorAll('.btn');

  /* ---------------- State ---------------- */
  let currentInput = '';     // the raw expression string being built, e.g. "12+5×("
  let justEvaluated = false; // true right after "=" — next digit starts a fresh expression
  let memoryValue = 0;
  let hasMemory = false;
  let history = []; // { expr, result } — newest first, in-memory for this session

  const OPERATORS = ['+', '-', '×', '÷'];

  /* ============================================================
     Digital clock
     ============================================================ */
  function updateClock() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    if (hours === 0) hours = 12;
    clockEl.textContent = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ============================================================
     Helpers for building the expression string safely
     ============================================================ */

  function lastChar() {
    return currentInput.length ? currentInput[currentInput.length - 1] : '';
  }

  function isDigit(ch) {
    return ch >= '0' && ch <= '9';
  }

  function isOperatorChar(ch) {
    return OPERATORS.includes(ch);
  }

  // Returns the substring of the current (still open) number segment,
  // i.e. everything since the last operator / paren / start of string.
  function currentNumberSegment() {
    let i = currentInput.length - 1;
    let seg = '';
    while (i >= 0 && !isOperatorChar(currentInput[i]) && currentInput[i] !== '(' && currentInput[i] !== ')') {
      seg = currentInput[i] + seg;
      i--;
    }
    return seg;
  }

  function openParenCount() {
    let count = 0;
    for (const ch of currentInput) {
      if (ch === '(') count++;
      if (ch === ')') count--;
    }
    return count;
  }

  /* ============================================================
     Input actions
     ============================================================ */

  function addDigit(d) {
    if (justEvaluated) {
      // Starting a brand new calculation after "="
      currentInput = '';
      justEvaluated = false;
    }
    // Prevent leading zeros like "007" (but allow "0.5")
    const seg = currentNumberSegment();
    if (seg === '0') {
      // replace the lone leading zero
      currentInput = currentInput.slice(0, -1) + d;
    } else {
      currentInput += d;
    }
    render();
  }

  function addDecimal() {
    if (justEvaluated) {
      currentInput = '0';
      justEvaluated = false;
    }
    const seg = currentNumberSegment();
    if (seg.includes('.')) return; // prevent multiple decimal points
    if (seg === '') currentInput += '0'; // ".5" -> "0.5"
    currentInput += '.';
    render();
  }

  function addOperator(op) {
    if (justEvaluated) {
      justEvaluated = false;
      // continue calculating from the previous answer
    }
    if (currentInput === '' && op !== '-') {
      return; // can't start with +, ×, ÷
    }
    const last = lastChar();
    if (isOperatorChar(last)) {
      // Replace the previous operator, unless user is typing a negative sign
      if (op === '-' && last !== '-') {
        currentInput += op; // allow e.g. "5×-3"
      } else {
        currentInput = currentInput.slice(0, -1) + op;
      }
    } else {
      currentInput += op;
    }
    render();
  }

  function addParen(paren) {
    if (justEvaluated) {
      currentInput = '';
      justEvaluated = false;
    }
    const last = lastChar();

    if (paren === '(') {
      // Implicit multiplication: "5(" -> "5×(" and ")(" -> ")×("
      if (isDigit(last) || last === ')') {
        currentInput += '×(';
      } else {
        currentInput += '(';
      }
    } else {
      // Closing paren: only allow if there's an open paren to match
      // and the previous character is a digit or closing paren.
      if (openParenCount() > 0 && (isDigit(last) || last === ')')) {
        currentInput += ')';
      }
    }
    render();
  }

  function backspace() {
    if (justEvaluated) {
      currentInput = '';
      justEvaluated = false;
      render();
      return;
    }
    currentInput = currentInput.slice(0, -1);
    render();
  }

  function clearEntry() {
    // Clears just the current number segment, keeps the rest of the expression
    const seg = currentNumberSegment();
    currentInput = currentInput.slice(0, currentInput.length - seg.length);
    justEvaluated = false;
    render();
  }

  function clearAll() {
    currentInput = '';
    justEvaluated = false;
    showResult('0', false);
    expressionEl.textContent = '\u00A0';
  }

  // Wraps the trailing number segment with a unary function, e.g. √( 16 )
  function applyUnaryToLastSegment(wrapStart, wrapEnd) {
    if (justEvaluated) justEvaluated = false;
    const seg = currentNumberSegment();
    const base = currentInput.slice(0, currentInput.length - seg.length);
    const target = seg !== '' ? seg : (evaluateSilently(currentInput) ?? '0');
    currentInput = base + wrapStart + target + wrapEnd;
    render();
  }

  function applySquareRoot() {
    applyUnaryToLastSegment('√(', ')');
  }

  function applySquare() {
    applyUnaryToLastSegment('(', '^2)');
  }

  function applyReciprocal() {
    applyUnaryToLastSegment('(1÷(', '))');
  }

  function applyPercent() {
    const seg = currentNumberSegment();
    if (seg === '' || seg === '-') return;
    const base = currentInput.slice(0, currentInput.length - seg.length);
    const value = parseFloat(seg);
    if (Number.isNaN(value)) return;
    currentInput = base + '(' + (value / 100) + ')';
    render();
  }

  /* ============================================================
     Memory functions
     ============================================================ */

  function currentDisplayValue() {
    const val = evaluateSilently(currentInput);
    return val !== null ? val : 0;
  }

  function memoryClear() {
    memoryValue = 0;
    hasMemory = false;
    updateMemoryIndicator();
  }

  function memoryRecall() {
    if (!hasMemory) return;
    if (justEvaluated) justEvaluated = false;
    currentInput = formatNumber(memoryValue);
    render();
  }

  function memoryAdd() {
    memoryValue += currentDisplayValue();
    hasMemory = true;
    updateMemoryIndicator();
  }

  function memorySubtract() {
    memoryValue -= currentDisplayValue();
    hasMemory = true;
    updateMemoryIndicator();
  }

  function updateMemoryIndicator() {
    memoryIndicatorEl.classList.toggle('active', hasMemory);
  }

  /* ============================================================
     History (saves every successful calculation this session)
     ============================================================ */

  const HISTORY_LIMIT = 50;

  function addHistoryEntry(expr, result) {
    history.unshift({ expr, result });
    if (history.length > HISTORY_LIMIT) history.pop();
    renderHistory();
  }

  function renderHistory() {
    historyListEl.innerHTML = '';
    if (history.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'history-empty';
      empty.textContent = 'No calculations yet 🌸';
      historyListEl.appendChild(empty);
      return;
    }
    history.forEach((entry) => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.setAttribute('role', 'button');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', `Reuse result ${entry.result}`);

      const exprLine = document.createElement('span');
      exprLine.className = 'history-item-expr';
      exprLine.textContent = entry.expr + ' =';

      const resultLine = document.createElement('span');
      resultLine.className = 'history-item-result';
      resultLine.textContent = entry.result;

      li.appendChild(exprLine);
      li.appendChild(resultLine);

      const reuse = () => {
        currentInput = entry.result.replace(/,/g, '');
        justEvaluated = true;
        closeHistory();
        render();
      };
      li.addEventListener('click', reuse);
      li.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          reuse();
        }
      });

      historyListEl.appendChild(li);
    });
  }

  function openHistory() {
    historyPanelEl.classList.add('open');
    historyPanelEl.setAttribute('aria-hidden', 'false');
    historyToggleEl.setAttribute('aria-expanded', 'true');
  }

  function closeHistory() {
    historyPanelEl.classList.remove('open');
    historyPanelEl.setAttribute('aria-hidden', 'true');
    historyToggleEl.setAttribute('aria-expanded', 'false');
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  historyToggleEl.addEventListener('click', () => {
    if (historyPanelEl.classList.contains('open')) {
      closeHistory();
    } else {
      openHistory();
    }
  });
  historyCloseEl.addEventListener('click', closeHistory);
  historyClearEl.addEventListener('click', clearHistory);

  /* ============================================================
     Safe expression parser / evaluator
     Grammar:
       expr    := term (('+'|'-') term)*
       term    := power (('×'|'÷') power)*
       power   := unary ('^' unary)*
       unary   := '-' unary | '√' unary | postfix
       postfix := atom ('%')*
       atom    := number | '(' expr ')'
     ============================================================ */

  class ParseError extends Error {}

  function evaluateExpression(str) {
    let pos = 0;

    // auto-close any unbalanced open parentheses so users aren't blocked
    const opens = openParenCountOf(str);
    if (opens > 0) str += ')'.repeat(opens);

    function peek() {
      return str[pos];
    }
    function eof() {
      return pos >= str.length;
    }

    function parseExpr() {
      let value = parseTerm();
      while (!eof() && (peek() === '+' || peek() === '-')) {
        const op = str[pos++];
        const rhs = parseTerm();
        value = op === '+' ? value + rhs : value - rhs;
      }
      return value;
    }

    function parseTerm() {
      let value = parsePower();
      while (!eof() && (peek() === '×' || peek() === '÷')) {
        const op = str[pos++];
        const rhs = parsePower();
        if (op === '×') {
          value = value * rhs;
        } else {
          if (rhs === 0) throw new ParseError('Division by zero');
          value = value / rhs;
        }
      }
      return value;
    }

    function parsePower() {
      let value = parseUnary();
      while (!eof() && peek() === '^') {
        pos++;
        const rhs = parseUnary();
        value = Math.pow(value, rhs);
      }
      return value;
    }

    function parseUnary() {
      if (!eof() && peek() === '-') {
        pos++;
        return -parseUnary();
      }
      if (!eof() && peek() === '√') {
        pos++;
        const val = parseUnary();
        if (val < 0) throw new ParseError('Invalid sqrt');
        return Math.sqrt(val);
      }
      return parsePostfix();
    }

    function parsePostfix() {
      let value = parseAtom();
      while (!eof() && peek() === '%') {
        pos++;
        value = value / 100;
      }
      return value;
    }

    function parseAtom() {
      if (eof()) throw new ParseError('Unexpected end of expression');
      if (peek() === '(') {
        pos++;
        const value = parseExpr();
        if (peek() !== ')') throw new ParseError('Missing )');
        pos++;
        return value;
      }
      // number
      let start = pos;
      while (!eof() && (isDigit(peek()) || peek() === '.')) pos++;
      if (pos === start) throw new ParseError('Expected number at position ' + pos);
      const numStr = str.slice(start, pos);
      const value = parseFloat(numStr);
      if (Number.isNaN(value)) throw new ParseError('Invalid number');
      return value;
    }

    if (str === '') throw new ParseError('Empty expression');
    const result = parseExpr();
    if (!eof()) throw new ParseError('Unexpected character at ' + pos);
    if (!Number.isFinite(result)) throw new ParseError('Result out of range');
    return result;
  }

  function openParenCountOf(str) {
    let count = 0;
    for (const ch of str) {
      if (ch === '(') count++;
      if (ch === ')') count--;
    }
    return Math.max(count, 0);
  }

  // Evaluate but never throw — returns null on failure. Used for live preview.
  function evaluateSilently(str) {
    if (!str || str === '') return null;
    // Don't try to evaluate a string that ends in an operator or open paren —
    // it's incomplete, not an error.
    const last = str[str.length - 1];
    if (isOperatorChar(last) || last === '(' || last === '.') return null;
    try {
      return evaluateExpression(str);
    } catch (e) {
      return null;
    }
  }

  function formatNumber(num) {
    if (!Number.isFinite(num)) return 'Error';
    // Round tiny floating point noise
    const rounded = Math.round((num + Number.EPSILON) * 1e10) / 1e10;
    if (Math.abs(rounded) >= 1e15 || (Math.abs(rounded) < 1e-9 && rounded !== 0)) {
      return rounded.toExponential(6);
    }
    // Use locale grouping for readability, but keep decimals compact
    const parts = rounded.toString().split('.');
    const intPart = parseInt(parts[0], 10).toLocaleString('en-US');
    return parts.length > 1 ? `${intPart}.${parts[1]}` : intPart;
  }

  /* ============================================================
     Rendering
     ============================================================ */

  function prettyExpression(str) {
    return str.length ? str : '\u00A0';
  }

  function autosizeResult(text) {
    resultEl.classList.remove('size-lg', 'size-md', 'size-sm', 'size-xs');
    const len = text.length;
    if (len <= 9) resultEl.classList.add('size-lg');
    else if (len <= 13) resultEl.classList.add('size-md');
    else if (len <= 18) resultEl.classList.add('size-sm');
    else resultEl.classList.add('size-xs');
  }

  function showResult(text, isError) {
    resultEl.textContent = text;
    resultEl.classList.toggle('error', !!isError);
    autosizeResult(text);
    resultEl.classList.remove('fade');
    // force reflow to restart animation
    void resultEl.offsetWidth;
    resultEl.classList.add('fade');
  }

  function render() {
    expressionEl.textContent = prettyExpression(currentInput);
    if (currentInput === '') {
      showResult('0', false);
      return;
    }
    const preview = evaluateSilently(currentInput);
    if (preview !== null) {
      showResult(formatNumber(preview), false);
    } else {
      // Incomplete expression — keep showing the current number segment big,
      // so the user always sees what they're typing.
      const seg = currentNumberSegment();
      showResult(seg !== '' ? seg : (currentInput || '0'), false);
    }
  }

  function calculateEquals() {
    if (currentInput === '') return;
    try {
      const value = evaluateExpression(currentInput);
      const formatted = formatNumber(value);
      expressionEl.textContent = currentInput + ' =';
      showResult(formatted, false);
      addHistoryEntry(currentInput, formatted);
      currentInput = formatted.replace(/,/g, '');
      justEvaluated = true;
    } catch (e) {
      showResult('Error', true);
      expressionEl.textContent = prettyExpression(currentInput);
      currentInput = '';
      justEvaluated = true;
    }
  }

  /* ============================================================
     Button press visual feedback
     ============================================================ */

  function flashButton(btn) {
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 180);
  }

  /* ============================================================
     Event wiring — click / tap
     ============================================================ */

  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      flashButton(btn);
      handleAction(btn.dataset.action, btn.dataset.value);
    });
  });

  function handleAction(action, value) {
    switch (action) {
      case 'number':
        addDigit(value);
        break;
      case 'decimal':
        addDecimal();
        break;
      case 'operator':
        addOperator(value === '/' ? '÷' : value === '*' ? '×' : value);
        break;
      case 'paren':
        addParen(value);
        break;
      case 'backspace':
        backspace();
        break;
      case 'ce':
        clearEntry();
        break;
      case 'c':
        clearAll();
        break;
      case 'percent':
        applyPercent();
        break;
      case 'sqrt':
        applySquareRoot();
        break;
      case 'square':
        applySquare();
        break;
      case 'reciprocal':
        applyReciprocal();
        break;
      case 'equals':
        calculateEquals();
        break;
      case 'mc':
        memoryClear();
        break;
      case 'mr':
        memoryRecall();
        break;
      case 'm-plus':
        memoryAdd();
        break;
      case 'm-minus':
        memorySubtract();
        break;
      default:
        break;
    }
  }

  /* ============================================================
     Keyboard support
     ============================================================ */

  const keyToButtonSelector = {
    '+': '[data-action="operator"][data-value="+"]',
    '-': '[data-action="operator"][data-value="-"]',
    '*': '[data-action="operator"][data-value="*"]',
    '/': '[data-action="operator"][data-value="/"]',
    'Enter': '.btn-equal',
    '=': '.btn-equal',
    'Escape': '[data-action="c"]',
    'Backspace': '[data-action="backspace"]',
    'Delete': '[data-action="ce"]',
    '%': '[data-action="percent"]',
    '(': '[data-action="paren"][data-value="("]',
    ')': '[data-action="paren"][data-value=")"]',
    '.': '[data-action="decimal"]',
  };

  window.addEventListener('keydown', (e) => {
    const key = e.key;

    if (key === 'Escape' && historyPanelEl.classList.contains('open')) {
      closeHistory();
      e.preventDefault();
      return;
    }

    if (isDigit(key)) {
      const btn = document.querySelector(`[data-action="number"][data-value="${key}"]`);
      if (btn) flashButton(btn);
      addDigit(key);
      e.preventDefault();
      return;
    }

    const selector = keyToButtonSelector[key];
    if (selector) {
      const btn = document.querySelector(selector);
      if (btn) flashButton(btn);
      e.preventDefault();

      switch (key) {
        case '+': addOperator('+'); break;
        case '-': addOperator('-'); break;
        case '*': addOperator('×'); break;
        case '/': addOperator('÷'); break;
        case 'Enter':
        case '=': calculateEquals(); break;
        case 'Escape': clearAll(); break;
        case 'Backspace': backspace(); break;
        case 'Delete': clearEntry(); break;
        case '%': applyPercent(); break;
        case '(': addParen('('); break;
        case ')': addParen(')'); break;
        case '.': addDecimal(); break;
        default: break;
      }
    }
  });

  /* ---------------- Initial paint ---------------- */
  render();

  /* ---------------- Splash screen hand-off ---------------- */
  const splashEl = document.getElementById('splash');
  const calculatorEl = document.getElementById('calculatorApp');
  const SPLASH_TOTAL_MS = 2000; // matches the 1.4s hold + 0.6s fade in CSS

  setTimeout(() => {
    calculatorEl.classList.remove('is-hidden');
    calculatorEl.classList.add('is-revealed');
    if (splashEl && splashEl.parentNode) {
      splashEl.parentNode.removeChild(splashEl);
    }
  }, SPLASH_TOTAL_MS);
})();

  </script>
</body>
</html>
